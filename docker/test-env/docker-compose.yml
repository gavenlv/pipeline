# apex-ci-library integration test environment
# Spins up:
#   - Nexus3 (Maven/npm/PyPI/raw repos)
#   - Local Docker registry (v2)
#
# Usage:
#   docker compose -f docker/test-env/docker-compose.yml up -d
#   bash docker/test-env/test-it.sh
#   docker compose -f docker/test-env/docker-compose.yml down -v
services:
  nexus:
    image: sonatype/nexus3:3.70.1
    container_name: apex-test-nexus
    hostname: nexus.local
    ports:
      - "8081:8081"
    environment:
      - NEXUS_SECURITY_RANDOMPASSWORD=false
    volumes:
      - nexus-data:/nexus-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  registry:
    image: registry:2.8
    container_name: apex-test-registry
    hostname: registry.local
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v2/_catalog"]
      interval: 10s
      timeout: 5s
      retries: 10

  jenkins:
    image: jenkins/jenkins:lts
    container_name: apex-test-jenkins
    hostname: jenkins.local
    user: root
    ports:
      - "8088:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - jenkins-data:/var/jenkins_home
      # Pre-seed the global pipeline library source from host.
      # Mounted RW so apex-entrypoint.sh can commit host-side changes
      # into the library's git repo (Jenkins reads from committed state).
      - ../../vars:/var/jenkins_home/casc_libs/apex-ci-library/vars
      - ../../src:/var/jenkins_home/casc_libs/apex-ci-library/src
      - ../../resources:/var/jenkins_home/casc_libs/apex-ci-library/resources
      # JCasC config + custom entrypoint + module test pipeline
      - ./jenkins/jenkins.yaml:/var/jenkins_home/casc/jenkins.yaml:ro
      - ./jenkins/apex-entrypoint.sh:/usr/local/bin/apex-entrypoint.sh:ro
      - ./jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d:ro
      - ./jenkins/Jenkinsfile-modules:/var/jenkins_home/Jenkinsfile-modules:ro
      - ./jenkins/Jenkinsfile-build-java:/var/jenkins_home/Jenkinsfile-build-java:ro
      - ./jenkins/Jenkinsfile-parallel-build:/var/jenkins_home/Jenkinsfile-parallel-build:ro
      - ./jenkins/Jenkinsfile-wait-scan:/var/jenkins_home/Jenkinsfile-wait-scan:ro
      - ./jenkins/Jenkinsfile-version:/var/jenkins_home/Jenkinsfile-version:ro
      - ./jenkins/Jenkinsfile-mixed:/var/jenkins_home/Jenkinsfile-mixed:ro
      # 仓库根 RW：构建产物 (samples/*/target 等) 需要在容器内写入
      - ../../:/var/jenkins_home/pipeline
      - ../../build/test-it-logs:/var/jenkins_home/test-it-logs:ro
      # Docker socket so Jenkins can buildx build
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/usr/local/bin/apex-entrypoint.sh"]
    depends_on:
      nexus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/login", "-o", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

volumes:
  nexus-data:
  registry-data:
  jenkins-data:
